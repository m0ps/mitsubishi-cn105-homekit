# Firmware Release CI/CD (ESP-IDF)
#
# Builds firmware for all chip targets using ESP-IDF and deploys to the
# serin-cn105 distribution repo for ESP Web Tools flashing.
#
# Required secret:
#   SERIN_CN105_PAT — GitHub Personal Access Token with `repo` scope
#                     for Serin-Labs/serin-cn105

name: Firmware Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: esp32c6
            name: nanoc6
            chip: ESP32-C6
          - target: esp32s3
            name: m5atoms3-lite
            chip: ESP32-S3
          - target: esp32
            name: esp32-devkit
            chip: ESP32
          - target: esp32c3
            name: esp32c3-mini
            chip: ESP32-C3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5
          target: ${{ matrix.target }}
          command: |
            # Derive profile macro from name (e.g. nanoc6 -> NANOC6, m5atoms3-lite -> M5ATOMS3_LITE)
            PROFILE=$(echo "${{ matrix.name }}" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
            idf.py set-target ${{ matrix.target }}
            idf.py -DBOARD_PROFILE_${PROFILE}=1 build

      - name: Collect artifacts
        env:
          BUILD_NAME: ${{ matrix.name }}
        run: |
          mkdir -p artifact/"${BUILD_NAME}"
          cp build/bootloader/bootloader.bin artifact/"${BUILD_NAME}"/bootloader.bin
          cp build/partition_table/partition-table.bin artifact/"${BUILD_NAME}"/partitions.bin
          cp build/ota_data_initial.bin artifact/"${BUILD_NAME}"/boot_app0.bin
          cp build/mitsubishi-cn105-homekit.bin artifact/"${BUILD_NAME}"/firmware.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.name }}
          path: artifact/${{ matrix.name }}/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: firmware-*
          path: artifacts/

      - name: Extract version from tag
        id: version
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "${REF_TYPE}" == "tag" ]]; then
            VERSION="${REF_NAME}"
          else
            VERSION="v0.0.0-dev"
          fi
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "number=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout serin-cn105
        uses: actions/checkout@v4
        with:
          repository: Serin-Labs/serin-cn105
          token: ${{ secrets.SERIN_CN105_PAT }}
          path: serin-cn105

      - name: Deploy firmware files
        run: |
          cd serin-cn105

          # Remove old firmware directories
          rm -rf firmware/homekit/nanoc6 \
                 firmware/homekit/m5atoms3-lite \
                 firmware/homekit/esp32-devkit \
                 firmware/homekit/esp32c3-mini

          # Remove legacy single merged bins if they exist
          rm -f firmware/homekit/*.bin

          # Copy new firmware files
          for name in nanoc6 m5atoms3-lite esp32-devkit esp32c3-mini; do
            mkdir -p firmware/homekit/${name}
            cp ../artifacts/firmware-${name}/* firmware/homekit/${name}/
          done

      - name: Generate manifest.json
        env:
          VERSION: ${{ steps.version.outputs.number }}
        run: |
          cat > serin-cn105/firmware/homekit/manifest.json << EOF
          {
            "name": "Mitsubishi HomeKit Controller",
            "version": "${VERSION}",
            "new_install_prompt_erase": true,
            "builds": [
              {
                "chipFamily": "ESP32-C6",
                "parts": [
                  { "path": "nanoc6/bootloader.bin", "offset": 0 },
                  { "path": "nanoc6/partitions.bin", "offset": 32768 },
                  { "path": "nanoc6/boot_app0.bin", "offset": 57344 },
                  { "path": "nanoc6/firmware.bin", "offset": 65536 }
                ]
              },
              {
                "chipFamily": "ESP32-S3",
                "parts": [
                  { "path": "m5atoms3-lite/bootloader.bin", "offset": 0 },
                  { "path": "m5atoms3-lite/partitions.bin", "offset": 32768 },
                  { "path": "m5atoms3-lite/boot_app0.bin", "offset": 57344 },
                  { "path": "m5atoms3-lite/firmware.bin", "offset": 65536 }
                ]
              },
              {
                "chipFamily": "ESP32",
                "parts": [
                  { "path": "esp32-devkit/bootloader.bin", "offset": 4096 },
                  { "path": "esp32-devkit/partitions.bin", "offset": 32768 },
                  { "path": "esp32-devkit/boot_app0.bin", "offset": 57344 },
                  { "path": "esp32-devkit/firmware.bin", "offset": 65536 }
                ]
              },
              {
                "chipFamily": "ESP32-C3",
                "parts": [
                  { "path": "esp32c3-mini/bootloader.bin", "offset": 0 },
                  { "path": "esp32c3-mini/partitions.bin", "offset": 32768 },
                  { "path": "esp32c3-mini/boot_app0.bin", "offset": 57344 },
                  { "path": "esp32c3-mini/firmware.bin", "offset": 65536 }
                ]
              }
            ]
          }
          EOF

      - name: Commit and push to serin-cn105
        env:
          VERSION: ${{ steps.version.outputs.number }}
        run: |
          cd serin-cn105
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add firmware/homekit/
          git commit -m "chore: update homekit firmware to ${VERSION}"
          git push

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: firmware-*
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release
          for name in nanoc6 m5atoms3-lite esp32-devkit esp32c3-mini; do
            cp artifacts/firmware-${name}/firmware.bin release/firmware-${name}.bin
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release/firmware-*.bin
